# Example Spark properties for Calibra online refinement.
# Use with:
#   python src/online_refinement_server.py --benchmark <BENCHMARK> --run-id <RUN_ID> --port 10533
#   python src/test.py --method online_refinement --benchmark <BENCHMARK> --run-id <RUN_ID> --conf-path conf/online-defaults.conf
#
# Replace placeholder paths and cluster sizing before running on your host.

spark.master spark://YOUR_SPARK_MASTER_HOST:7077
spark.local.dir /path/to/spark-local-dir
spark.sql.warehouse.dir file:/path/to/spark-warehouse
spark.driver.memory 10g
spark.driver.maxResultSize 4g
spark.executor.instances 6
spark.cores.max 36
spark.executor.cores 6
spark.executor.memory 10g
spark.hadoop.fs.defaultFS file:///
spark.eventLog.enabled true
spark.eventLog.dir file:/path/to/spark-event-logs

# RuntimeCost jar hooks Spark into the Python online refinement server.
spark.jars /path/to/Calibra_release/jar/runtimecost_2.12-0.1.0-SNAPSHOT.jar
spark.sql.queryExecutionListeners cn.edu.ruc.QueryRegisterListener
spark.sql.adaptive.customCostEvaluatorClass cn.edu.ruc.RuntimeCostEvaluator

# Native Spark CBO/statistics knobs.
spark.sql.adaptive.enabled true
spark.sql.cbo.enabled true
spark.sql.cbo.joinReorder.enabled true
spark.sql.cbo.joinReorder.dp.threshold 18
spark.sql.statistics.histogram.enabled true
spark.sql.statistics.histogram.numBins 64
spark.sql.cbo.planStats.enabled true
spark.sql.optimizer.runtime.bloomFilter.enabled false
spark.sql.adaptive.optimizer.excludedRules org.apache.spark.sql.execution.adaptive.AQEPropagateEmptyRelation

# Calibra service endpoints.
spark.sql.calibra.serverUri http://localhost:10533
spark.sql.adaptive.costEvaluator.serverUri http://localhost:10533

# Online refinement uses the current model for selection and registers executed plans as labels.
spark.sql.calibra.enabled true
spark.sql.cbo.calibra.enabled true
spark.sql.physical.calibra.enabled true
spark.sql.adaptive.ssa.enabled true
spark.sql.adaptive.lssa.enabled false

# Calibra logical join-reorder candidate generation/pruning.
spark.sql.cbo.joinReorder.dp.costEvaluateThreshold 4
spark.sql.cbo.joinReorder.dp.beamWidth 1
spark.sql.cbo.joinReorder.dp.pruneMode top
spark.sql.cbo.joinReorder.dp.pruneLimit 4
spark.sql.cbo.joinReorder.dp.forceSendPlan false

# Calibra physical-planner search knobs.
spark.sql.planner.greedyEnabled true
spark.sql.planner.maxPlans 3
spark.sql.planner.forceBHJMargin 0.2
spark.sql.planner.forceBHJMaxSize -1
spark.sql.planner.forceBHJEnumerateBuildSides false
